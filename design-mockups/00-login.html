<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FinanceAI</title>
<link rel="stylesheet" href="_base.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
body.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);padding:24px 16px;
}
.login-wrap{
  width:100%;max-width:420px;
}
.login-logo-row{
  text-align:center;margin-bottom:32px;
}
.login-logo{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:32px;font-weight:800;color:var(--primary);letter-spacing:-.02em;
}
.login-tagline{ font-size:14px;color:var(--on-surface-3);margin-top:4px; }
.login-illo{
  width:120px;height:120px;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--primary-bg) 0%,var(--secondary-container) 100%);
  border-radius:32px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(70,72,212,.18);
}
.login-card{
  background:var(--surface);
  border:1px solid rgba(199,196,215,.30);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow-card-md);
  padding:32px 28px;
}
.login-heading{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:22px;font-weight:700;color:var(--on-surface);margin-bottom:4px;
}
.login-sub{ font-size:14px;color:var(--on-surface-3);margin-bottom:24px; }
.input-icon-wrap{ position:relative; }
.input-icon-wrap .ico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:20px;color:var(--on-surface-3);pointer-events:none;
}
.input-icon-wrap .form-input{ padding-left:44px; }
.forgot-link{
  text-align:right;margin-bottom:20px;
  font-size:13px;color:var(--primary);font-weight:600;cursor:pointer;
}
.or-divider{
  display:flex;align-items:center;gap:12px;margin:16px 0;
}
.or-divider::before,.or-divider::after{
  content:'';flex:1;height:1px;background:var(--outline-variant);
}
.or-divider span{ font-size:12px;color:var(--on-surface-3); }
.bio-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--surface-low);color:var(--on-surface-2);
  border:1.5px solid var(--outline-variant);border-radius:var(--r-full);
  padding:13px 24px;font-size:15px;font-weight:600;width:100%;cursor:pointer;
  font-family:'Work Sans',sans-serif;
}
.login-footer{ text-align:center;margin-top:20px;font-size:13.5px;color:var(--on-surface-3); }
.login-footer a{ color:var(--primary);font-weight:600;text-decoration:none; }
.ai-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(70,72,212,.08);border:1px solid rgba(70,72,212,.15);
  border-radius:20px;padding:5px 14px;margin-top:12px;
}
</style>
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-logo-row">
    <div class="login-illo">
      <span class="material-symbols-outlined icon-fill" style="font-size:56px;color:var(--primary);">receipt_long</span>
    </div>
    <div class="login-logo">FinanceAI</div>
    <div class="login-tagline">Smart GST Billing for Indian Businesses</div>
    <div>
      <div class="ai-badge">
        <span class="material-symbols-outlined icon-fill" style="font-size:14px;color:var(--primary);">auto_awesome</span>
        <span style="font-size:12px;font-weight:600;color:var(--primary);font-family:'Work Sans',sans-serif;">AI-Powered · GST Compliant · UPI Ready</span>
      </div>
    </div>
  </div>

  <div class="login-card">
    <div class="login-heading">Welcome back</div>
    <div class="login-sub">Sign in to your business account</div>

    <div class="form-group">
      <label class="form-label">Phone or Email</label>
      <div class="input-icon-wrap">
        <span class="material-symbols-outlined ico">person</span>
        <input type="text" class="form-input" placeholder="9876543210 or you@business.com">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-icon-wrap">
        <span class="material-symbols-outlined ico">lock</span>
        <input type="password" class="form-input" placeholder="Enter your password">
      </div>
    </div>

    <div class="forgot-link">Forgot password?</div>

    <button class="btn btn-primary" style="margin-bottom:16px;">
      <span class="material-symbols-outlined" style="font-size:20px;">login</span>
      Sign In
    </button>

    <div class="or-divider"><span>or continue with</span></div>

    <button class="bio-btn">
      <span class="material-symbols-outlined">fingerprint</span>
      Biometric Sign In
    </button>

    <div class="login-footer">
      New to FinanceAI? <a href="#">Register Free</a>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <span style="font-size:11px;color:var(--on-surface-3);">256-bit SSL · RBI Compliant · GST Ready</span>
    </div>
  </div>
</div>
</body>
</html>
